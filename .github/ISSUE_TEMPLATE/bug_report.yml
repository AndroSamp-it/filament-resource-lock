name: Bug report
description: Report a bug or unexpected behavior
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill in as much detail as possible.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Step-by-step instructions to reproduce the issue.
      placeholder: |
        1. Configure update_driver to ...
        2. Open an EditRecord page for ...
        3. Open the same record in a second tab ...
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened? Include any error messages or stack traces.
    validations:
      required: true

  - type: dropdown
    id: update_driver
    attributes:
      label: Update driver
      options:
        - heartbeat
        - broadcast
    validations:
      required: true

  - type: dropdown
    id: storage_driver
    attributes:
      label: Storage driver
      options:
        - database
        - redis
    validations:
      required: true

  - type: input
    id: package_version
    attributes:
      label: Package version (androsamp/filament-resource-lock)
      placeholder: "1.0.0"
    validations:
      required: true

  - type: input
    id: php_version
    attributes:
      label: PHP version
      placeholder: "8.3"
    validations:
      required: true

  - type: input
    id: laravel_version
    attributes:
      label: Laravel version
      placeholder: "13.x"
    validations:
      required: true

  - type: input
    id: filament_version
    attributes:
      label: Filament version
      placeholder: "5.x"
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else that might help — config snippet, relevant model, etc.
